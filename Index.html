<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Julia ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fdf6f6;
  color: #444;
}

/* TELA INICIAL */
#start {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #fdf6f6;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  cursor: pointer;
}

#start h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  color: #e89cae;
}

/* CONTEÚDO */
#content {
  display: none;
  padding: 40px 20px;
  max-width: 700px;
  margin: auto;
  text-align: center;
  animation: fadeIn 2s ease;
}

h2 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
}

p {
  line-height: 1.8;
  font-size: 18px;
  white-space: pre-line;
}

#tempoJuntos {
  margin-top: 25px;
  font-size: 18px;
  color: #666;
  font-weight: bold;
}

/* ANIMAÇÕES */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

.heart {
  margin-top: 30px;
  font-size: 24px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div id="start" onclick="abrir()">
  <h1>Uma mensagem para você, Julia 💌</h1>
  <p>clique para abrir</p>
</div>

<div id="content">
  <h2>Para Julia 💖</h2>
  <p id="mensagem"></p>
  <div id="tempoJuntos"></div>
  <div class="heart">❤️</div>
</div>

<!-- MÚSICA -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/ILRs2r6lcHY?autoplay=1&loop=1&playlist=ILRs2r6lcHY"
allow="autoplay"></iframe>

<script>
function abrir() {
  document.getElementById("start").style.display = "none";
  document.getElementById("content").style.display = "block";
  
  escrever();
  setInterval(calcularTempo, 1000);
}

/* TEXTO */
const texto = `Julia...

Eu não quero apressar as coisas.

Quero te conhecer no seu tempo,
entender cada detalhe seu,
e te amar com calma...

Quero ser alguém que te faça bem,
que respeita seu espaço,
e que escolhe você todos os dias.

Porque você é muito especial pra mim. 💖`;

let i = 0;

function escrever() {
  if (i < texto.length) {
    document.getElementById("mensagem").innerHTML += texto.charAt(i);
    i++;
    setTimeout(escrever, 35);
  }
}

/* DATA INICIAL */
const dataInicio = new Date("2025-12-10T00:00:00"); // ALTERA AQUI

function calcularTempo() {
  const agora = new Date();

  let anos = agora.getFullYear() - dataInicio.getFullYear();
  let meses = agora.getMonth() - dataInicio.getMonth();
  let dias = agora.getDate() - dataInicio.getDate();
  let horas = agora.getHours() - dataInicio.getHours();
  let minutos = agora.getMinutes() - dataInicio.getMinutes();
  let segundos = agora.getSeconds() - dataInicio.getSeconds();

  if (segundos < 0) {
    segundos += 60;
    minutos--;
  }

  if (minutos < 0) {
    minutos += 60;
    horas--;
  }

  if (horas < 0) {
    horas += 24;
    dias--;
  }

  if (dias < 0) {
    meses--;
    const diasMes = new Date(agora.getFullYear(), agora.getMonth(), 0).getDate();
    dias += diasMes;
  }

  if (meses < 0) {
    meses += 12;
    anos--;
  }

  document.getElementById("tempoJuntos").innerHTML =
    `Estamos juntos há 💖<br>
     ${anos} ano(s), ${meses} mês(es), ${dias} dia(s)<br>
     ${horas}h ${minutos}m ${segundos}s`;
}
</script>

</body>
</html>
