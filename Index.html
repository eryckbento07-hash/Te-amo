<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Julia 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
  font-family: 'Inter', sans-serif;
  color: #fff;
  background: radial-gradient(circle at center, #3b0a3f 0%, #140014 100%);
  text-align: center;
  overflow-x: hidden;
}

/* ESTRELAS */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  animation: moveStars 60s linear infinite;
  opacity: 0.3;
}

@keyframes moveStars {
  from {background-position: 0 0;}
  to {background-position: 1000px 1000px;}
}

/* ESCURECER TELA */
.overlay {
  position: fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  opacity:0;
  transition:0.5s;
  pointer-events:none;
}

/* CORAÇÃO BATENDO */
.heart {
  font-size: 45px;
  color: #ff6fa5;
  animation: beat 1s infinite;
}

@keyframes beat {
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

.container { padding: 30px 20px; }

.title {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
  margin-top: 20px;
}

.boxes {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:40px;
}

.box {
  width:120px;
  height:120px;
  border-radius:25px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,105,180,0.4);
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.box span {
  font-size:40px;
}

/* TEXTO SURGINDO */
.card {
  margin-top:40px;
  padding:25px;
  border-radius:25px;
  background: rgba(255,255,255,0.05);
  opacity:0;
  transform: translateY(20px);
  transition:1s;
}

/* MÚSICA */
.music-card {
  margin-top:50px;
  padding:25px;
  border-radius:25px;
  background: rgba(255,255,255,0.05);
}

.music-btn {
  margin-top:15px;
  padding:15px;
  border-radius:20px;
  background: rgba(0,0,0,0.3);
  cursor:pointer;
  transition:0.3s;
}

.music-btn.playing {
  background:#ff6fa5;
}

/* BARRA */
.progress {
  width:100%;
  height:5px;
  background:#444;
  margin-top:10px;
  border-radius:10px;
  overflow:hidden;
}

.progress div {
  height:100%;
  width:0%;
  background:#ff6fa5;
  animation: progress 180s linear forwards;
}

@keyframes progress {
  from {width:0;}
  to {width:100%;}
}

.music-img {
  width:200px;
  border-radius:20px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="overlay" id="overlay"></div>

<div class="container">

<div class="heart">💖</div>
<div class="title">Para o amor da minha vida!</div>

<div class="boxes">
  <div class="box">
    <span id="meses">0</span>
    <small>MESES</small>
  </div>

  <div class="box">
    <span id="dias">0</span>
    <small>DIAS</small>
  </div>
</div>

<div class="card" id="texto">
Julia,<br><br>
Desde que você entrou na minha vida, tudo ganhou mais cor... 💖
</div>

<div class="music-card">

<div class="music-btn" id="btn" onclick="tocar()">▶ Descobrir música</div>

<div id="musica" style="display:none;">
<img src="https://img.youtube.com/vi/sRITrFmTT3s/maxresdefault.jpg" class="music-img">

<div class="progress"><div></div></div>

<div class="music-btn" onclick="pausar()">⏸ Pausar</div>
</div>

</div>

</div>

<iframe id="player" width="0" height="0" allow="autoplay"></iframe>

<script>
const inicio = new Date(2026,0,8);

function atualizar(){
 const agora = new Date();
 const diff = Math.floor((agora - inicio)/(1000*60*60*24));
 document.getElementById("dias").innerText = diff;
 document.getElementById("meses").innerText = Math.floor(diff/30);
}
setInterval(atualizar,1000);

/* REVELAÇÃO TEXTO */
setTimeout(()=>{
 document.getElementById("texto").style.opacity=1;
 document.getElementById("texto").style.transform="translateY(0)";
},1500);

/* MÚSICA */
function tocar(){
 document.getElementById("overlay").style.opacity=1;

 let player = document.getElementById("player");
 player.src="https://www.youtube.com/embed/sRITrFmTT3s?autoplay=1";

 document.getElementById("btn").innerText="🎶 Tocando...";
 document.getElementById("btn").classList.add("playing");

 document.getElementById("musica").style.display="block";
}

function pausar(){
 document.getElementById("player").src="";
 document.getElementById("overlay").style.opacity=0;
 document.getElementById("btn").innerText="▶ Descobrir música";
 document.getElementById("btn").classList.remove("playing");
}
</script>

</body>
</html>
