<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Julia 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
  font-family: 'Inter', sans-serif;
  color: #fff;
  background: radial-gradient(circle at center, #3b0a3f 0%, #140014 100%);
  text-align: center;
}

/* CONTAINER */
.container {padding:30px 20px;}

.title {
  font-family: 'Playfair Display', serif;
  font-size: 38px;
  margin-top: 20px;
}

/* CAIXAS */
.boxes {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.box {
  width:120px;
  height:120px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,105,180,0.4);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.box span {
  font-size:40px;
  font-family:'Playfair Display', serif;
}

/* MÚSICA */
.music-card {
  margin-top:50px;
  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
}

.music-btn {
  margin-top:20px;
  padding:15px;
  border-radius:20px;
  background:rgba(0,0,0,0.3);
  cursor:pointer;
}

/* PLAYER */
.spotify {
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">Para Julia 💖</h1>

<div class="boxes">
  <div class="box">
    <span id="meses">0</span>
    <small>MESES</small>
  </div>

  <div class="box">
    <span id="dias">0</span>
    <small>DIAS</small>
  </div>
</div>

<!-- MÚSICA -->
<div class="music-card">

<h2>Nossa Música 🎵</h2>

<div class="music-btn" id="btnDescobrir" onclick="descobrir()">
▶ Clique para descobrir
</div>

<div id="musicaInfo" style="display:none;">

  <p style="margin-top:15px;">
    Nossa música especial 💖
  </p>

  <!-- PLAYER SPOTIFY -->
  <iframe id="spotifyPlayer"
    style="border-radius:12px"
    src=""
    width="100%"
    height="152"
    frameBorder="0"
    allowfullscreen=""
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
  </iframe>

  <!-- BOTÕES -->
  <div class="music-btn" onclick="tocar()">▶ Tocar</div>
  <div class="music-btn" onclick="pausar()">⏸ Pausar</div>

</div>

</div>

</div>

<script>
const inicio = new Date(2026,0,8);

function atualizar(){
  const agora = new Date();

  let meses = (agora.getFullYear()-inicio.getFullYear())*12;
  meses += agora.getMonth()-inicio.getMonth();

  let dias = agora.getDate()-inicio.getDate();
  if(dias<0){
    meses--;
    dias += new Date(agora.getFullYear(), agora.getMonth(),0).getDate();
  }

  document.getElementById("meses").innerText = meses;
  document.getElementById("dias").innerText = dias;
}

setInterval(atualizar,1000);

/* BOTÕES */
function descobrir(){
  document.getElementById("btnDescobrir").style.display="none";
  document.getElementById("musicaInfo").style.display="block";
}

/* SPOTIFY */
function tocar(){
  document.getElementById("spotifyPlayer").src =
  "https://open.spotify.com/embed/track/3vit743HobxF9rQxrMZf1c?utm_source=generator&autoplay=1";
}

function pausar(){
  document.getElementById("spotifyPlayer").src = "";
}
</script>

</body>
</html>
