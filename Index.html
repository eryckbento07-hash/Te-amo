<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Julia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #fbf8f8;
  font-family: 'Inter', sans-serif;
  color: #5a5a5a;
}

/* tela inicial */
#start {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #fbf8f8;
  cursor: pointer;
  text-align: center;
}

#start h1 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  color: #c98b95;
  margin-bottom: 8px;
  font-weight: 500;
}

#start span {
  font-size: 13px;
  opacity: 0.5;
}

/* layout carta */
#content {
  display: none;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.card {
  width: 100%;
  max-width: 520px;
  background: #ffffff;
  padding: 42px 32px;
  border-radius: 14px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.04);
  text-align: center;
  animation: fade 1.2s ease;
}

h2 {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  color: #c98b95;
  margin-bottom: 28px;
}

.texto {
  font-size: 16px;
  line-height: 1.9;
  white-space: pre-line;
}

#tempo {
  margin-top: 28px;
  font-size: 14px;
  color: #999;
  line-height: 1.6;
}

.heart {
  margin-top: 25px;
  font-size: 18px;
  opacity: 0.8;
}

/* animação suave */
@keyframes fade {
  from {opacity: 0; transform: translateY(8px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div id="start" onclick="abrir()">
  <h1>Para você, Julia</h1>
  <span>toque para abrir</span>
</div>

<div id="content">
  <div class="card">
    <h2>Julia</h2>
    <div id="mensagem" class="texto"></div>
    <div id="tempo"></div>
    <div class="heart">❤</div>
  </div>
</div>

<!-- música -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/ILRs2r6lcHY?autoplay=1&loop=1&playlist=ILRs2r6lcHY"
allow="autoplay"></iframe>

<script>
function abrir() {
  document.getElementById("start").style.display = "none";
  document.getElementById("content").style.display = "flex";

  escrever();
  setInterval(calcularTempo, 1000);
}

/* texto estilo DearYou */
const texto = `Julia,

eu não quero apressar nada.

quero te conhecer com calma,
no seu tempo,
do seu jeito.

quero ser alguém leve na sua vida,
alguém que te faça bem,
que te respeita,
e que escolhe você todos os dias.

porque você é especial pra mim.`;

/* efeito digitação */
let i = 0;
function escrever() {
  if (i < texto.length) {
    document.getElementById("mensagem").innerHTML += texto.charAt(i);
    i++;
    setTimeout(escrever, 28);
  }
}

/* data relacionamento */
const dataInicio = new Date("2025-12-10T00:00:00"); // ALTERA

function calcularTempo() {
  const agora = new Date();

  let anos = agora.getFullYear() - dataInicio.getFullYear();
  let meses = agora.getMonth() - dataInicio.getMonth();
  let dias = agora.getDate() - dataInicio.getDate();
  let horas = agora.getHours() - dataInicio.getHours();
  let minutos = agora.getMinutes() - dataInicio.getMinutes();
  let segundos = agora.getSeconds() - dataInicio.getSeconds();

  if (segundos < 0) { segundos += 60; minutos--; }
  if (minutos < 0) { minutos += 60; horas--; }
  if (horas < 0) { horas += 24; dias--; }
  if (dias < 0) {
    meses--;
    dias += new Date(agora.getFullYear(), agora.getMonth(), 0).getDate();
  }
  if (meses < 0) { meses += 12; anos--; }

  document.getElementById("tempo").innerHTML =
    `${anos} anos, ${meses} meses, ${dias} dias<br>
     ${horas}h ${minutos}m ${segundos}s`;
}
</script>

</body>
  </html>
