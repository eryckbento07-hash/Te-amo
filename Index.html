<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Julia 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at center, #3a0a3f, #120012);
  color: white;
  text-align: center;
}

/* FUNDO COM BRILHO */
.glow {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,0,150,0.2), transparent 70%);
  z-index: 0;
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 1;
  padding: 30px 20px;
}

/* TÍTULO */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  margin-top: 40px;
}

.heart {
  font-size: 40px;
  color: #ff6fa5;
}

/* DATA */
.date {
  margin: 15px 0;
  opacity: 0.7;
}

/* CAIXAS */
.boxes {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 25px;
}

.box {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 20px;
  width: 100px;
  backdrop-filter: blur(10px);
}

.box span {
  font-size: 28px;
  display: block;
}

.box small {
  opacity: 0.6;
}

/* RELÓGIO */
.clock {
  margin-top: 25px;
  padding: 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  display: inline-block;
}

/* TEXTO */
.card {
  margin-top: 40px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  line-height: 1.8;
}

/* BOTÃO MÚSICA */
.music {
  margin-top: 30px;
  padding: 15px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

<div class="heart">💖</div>
<h1>Para o amor da minha vida</h1>

<div class="date">
Juntos desde <b>20 de novembro de 2025</b>
</div>

<div class="boxes">
  <div class="box">
    <span id="meses">0</span>
    <small>MESES</small>
  </div>
  <div class="box">
    <span id="dias">0</span>
    <small>DIAS</small>
  </div>
</div>

<div class="clock" id="relogio">00:00:00</div>

<div class="card">
Desde o primeiro dia em que te vi, soube que minha vida jamais seria a mesma...

Você é meu porto seguro, minha paz e minha maior aventura. 💖
</div>

<div class="music" onclick="tocarMusica()">
▶ Clique para tocar nossa música
</div>

</div>

<!-- MÚSICA -->
<iframe id="player" width="0" height="0"
src=""
allow="autoplay"></iframe>

<script>
const dataInicio = new Date("2025-11-20T00:00:00"); // ALTERA

function atualizarTempo() {
  const agora = new Date();

  let meses = (agora.getFullYear() - dataInicio.getFullYear()) * 12;
  meses += agora.getMonth() - dataInicio.getMonth();

  let dias = agora.getDate() - dataInicio.getDate();
  if (dias < 0) {
    meses--;
    const ultimoMes = new Date(agora.getFullYear(), agora.getMonth(), 0).getDate();
    dias += ultimoMes;
  }

  let horas = agora.getHours().toString().padStart(2,'0');
  let minutos = agora.getMinutes().toString().padStart(2,'0');
  let segundos = agora.getSeconds().toString().padStart(2,'0');

  document.getElementById("meses").innerText = meses;
  document.getElementById("dias").innerText = dias;
  document.getElementById("relogio").innerText = `${horas}:${minutos}:${segundos}`;
}

setInterval(atualizarTempo, 1000);

/* MÚSICA */
function tocarMusica() {
  document.getElementById("player").src =
  "https://www.youtube.com/embed/ILRs2r6lcHY?autoplay=1&loop=1&playlist=ILRs2r6lcHY";
}
</script>

</body>
</html>
