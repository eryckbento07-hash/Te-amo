<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Você ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* TELA INICIAL */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
  cursor: pointer;
}

/* CONTEÚDO */
#mainContent {
  display: none;
  height: 100vh;
  background: linear-gradient(to bottom, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  margin-top: 20%;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
}

h1 {
  font-size: 40px;
}

p {
  font-size: 20px;
  line-height: 1.6;
}

/* ANIMAÇÃO TEXTO */
.typing {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  display: inline-block;
}

/* CORAÇÕES */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- TELA INICIAL -->
<div id="startScreen" onclick="startSite()">
  💌 Clique para abrir
</div>

<!-- CONTEÚDO PRINCIPAL -->
<div id="mainContent">
  <div class="container">
    <h1>Para você 💖</h1>
    <p id="text" class="typing"></p>
  </div>
</div>

<!-- MÚSICA -->
<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function startSite() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
  
  document.getElementById("music").play();

  startTyping();
  createHearts();
}

/* TEXTO QUE VAI APARECER */
const message = "Eu não quero apressar as coisas... só quero te conhecer melhor, te amar com calma e te fazer sentir o quanto você é especial pra mim. 💖";

/* EFEITO DIGITAÇÃO */
let i = 0;
function startTyping() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(startTyping, 50);
  }
}

/* CORAÇÕES SUBINDO */
function createHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
  </html>
