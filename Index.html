<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Você ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fdf6f6;
  color: #444;
}

/* TELA INICIAL */
#start {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #fdf6f6;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  cursor: pointer;
}

#start h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  color: #e89cae;
}

#start p {
  font-size: 16px;
  opacity: 0.7;
}

/* CONTEÚDO */
#content {
  display: none;
  padding: 40px 20px;
  max-width: 700px;
  margin: auto;
  text-align: center;
  animation: fadeIn 2s ease;
}

h2 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  margin-bottom: 20px;
}

p {
  line-height: 1.8;
  font-size: 18px;
  white-space: pre-line;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* CORAÇÃO */
.heart {
  margin-top: 30px;
  font-size: 24px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<!-- TELA INICIAL -->
<div id="start" onclick="abrir()">
  <h1>Uma mensagem pra você</h1>
  <p>clique para abrir 💌</p>
</div>

<!-- CONTEÚDO -->
<div id="content">
  <h2>Para você 💖</h2>
  <p id="mensagem"></p>
  <div class="heart">❤️</div>
</div>

<script>
function abrir() {
  document.getElementById("start").style.display = "none";
  document.getElementById("content").style.display = "block";
  escrever();
}

const texto = `Eu não quero apressar as coisas...

Quero te conhecer no seu tempo,
entender cada detalhe seu,
e te amar com calma...

Quero ser alguém que te faz bem,
que respeita seu espaço,
e que escolhe você todos os dias.

Porque você é especial pra mim. 💖`;

let i = 0;

function escrever() {
  if (i < texto.length) {
    document.getElementById("mensagem").innerHTML += texto.charAt(i);
    i++;
    setTimeout(escrever, 35);
  }
}
</script>

</body>
</html>
