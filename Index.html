<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Julia ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #faf7f7;
  font-family: 'Inter', sans-serif;
  color: #555;
}

/* TELA INICIAL */
#start {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #faf7f7;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  cursor: pointer;
  text-align: center;
}

#start h1 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: #d88c9a;
  margin-bottom: 10px;
}

#start p {
  font-size: 14px;
  opacity: 0.6;
}

/* CARTA */
#content {
  display: none;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: white;
  max-width: 600px;
  width: 100%;
  padding: 40px 30px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  text-align: center;
  animation: fadeIn 1.5s ease;
}

h2 {
  font-family: 'Playfair Display', serif;
  color: #d88c9a;
  margin-bottom: 25px;
}

.texto {
  line-height: 1.9;
  font-size: 17px;
  white-space: pre-line;
}

#tempo {
  margin-top: 25px;
  font-size: 15px;
  color: #888;
}

.heart {
  margin-top: 25px;
  font-size: 20px;
  animation: pulse 1.5s infinite;
}

/* ANIMAÇÕES */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.15);}
  100% {transform: scale(1);}
}
</style>
</head>

<body>

<!-- TELA INICIAL -->
<div id="start" onclick="abrir()">
  <h1>Uma mensagem para você, Julia</h1>
  <p>clique para abrir 💌</p>
</div>

<!-- CONTEÚDO -->
<div id="content">
  <div class="card">
    <h2>Para Julia 💖</h2>
    <div id="mensagem" class="texto"></div>
    <div id="tempo"></div>
    <div class="heart">❤️</div>
  </div>
</div>

<!-- MÚSICA -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/ILRs2r6lcHY?autoplay=1&loop=1&playlist=ILRs2r6lcHY"
allow="autoplay"></iframe>

<script>
function abrir() {
  document.getElementById("start").style.display = "none";
  document.getElementById("content").style.display = "flex";

  escrever();
  setInterval(calcularTempo, 1000);
}

/* TEXTO */
const texto = `Julia...

Eu não quero apressar as coisas.

Quero te conhecer no seu tempo,
entender cada detalhe seu,
e te amar com calma...

Quero ser alguém que te faça bem,
que respeita seu espaço,
e que escolhe você todos os dias.

Porque você é muito especial pra mim. 💖`;

let i = 0;

function escrever() {
  if (i < texto.length) {
    document.getElementById("mensagem").innerHTML += texto.charAt(i);
    i++;
    setTimeout(escrever, 30);
  }
}

/* DATA */
const dataInicio = new Date("2025-12-10T00:00:00"); // ALTERA

function calcularTempo() {
  const agora = new Date();

  let anos = agora.getFullYear() - dataInicio.getFullYear();
  let meses = agora.getMonth() - dataInicio.getMonth();
  let dias = agora.getDate() - dataInicio.getDate();
  let horas = agora.getHours() - dataInicio.getHours();
  let minutos = agora.getMinutes() - dataInicio.getMinutes();
  let segundos = agora.getSeconds() - dataInicio.getSeconds();

  if (segundos < 0) { segundos += 60; minutos--; }
  if (minutos < 0) { minutos += 60; horas--; }
  if (horas < 0) { horas += 24; dias--; }
  if (dias < 0) {
    meses--;
    dias += new Date(agora.getFullYear(), agora.getMonth(), 0).getDate();
  }
  if (meses < 0) { meses += 12; anos--; }

  document.getElementById("tempo").innerHTML =
    `Desde que tudo começou:<br>
     ${anos} ano(s), ${meses} mês(es), ${dias} dia(s)<br>
     ${horas}h ${minutos}m ${segundos}s 💖`;
}
</script>

</body>
</html>
