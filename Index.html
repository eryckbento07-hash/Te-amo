<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Julia 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
  font-family: 'Inter', sans-serif;
  color: #fff;
  background: radial-gradient(circle at center, #3b0a3f 0%, #140014 100%);
  text-align: center;
  overflow-x: hidden;
}

/* UNIVERSO */
.universe {
  position: fixed;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: -2;
}

.universe span {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: brilho 2s infinite alternate;
}

@keyframes brilho {
  from {opacity: 0.3;}
  to {opacity: 1;}
}

/* ESTRELA CADENTE */
.shooting-star {
  position: fixed;
  width: 2px;
  height: 80px;
  background: linear-gradient(white, transparent);
  transform: rotate(45deg);
  animation: shooting 8s linear infinite;
}

@keyframes shooting {
  0% {top:-10%; left:80%; opacity:0;}
  10% {opacity:1;}
  100% {top:100%; left:-10%; opacity:0;}
}

/* ESTRELAS BASE */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.stars::before {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size:3px 3px;
  animation: moveStars 100s linear infinite;
}

@keyframes moveStars {
  from {transform: translate(0,0);}
  to {transform: translate(-500px,-500px);}
}

/* OVERLAY */
.overlay {
  position: fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  opacity:0;
  transition:0.5s;
  pointer-events:none;
}

/* GLOW */
.glow {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,105,180,0.2), transparent 70%);
  animation: pulse 6s infinite alternate;
}

@keyframes pulse {
  from {opacity: 0.4;}
  to {opacity: 0.8;}
}

.container { padding: 30px 20px; }

/* CORAÇÃO */
.heart {
  font-size: 45px;
  color: #ff6fa5;
  animation: batida 1s infinite;
}

@keyframes batida {
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

.title {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
  margin-top: 20px;
}

.date { margin-top: 15px; opacity: 0.7; }

/* CAIXAS */
.boxes {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:40px;
}

.box {
  width:120px;
  height:120px;
  border-radius:25px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,105,180,0.4);
  box-shadow: 0 0 25px rgba(255,105,180,0.25);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.box span {
  font-size:40px;
}

/* RELÓGIO */
.clock {
  margin-top:30px;
  padding:15px 25px;
  border-radius:30px;
  background: rgba(255,255,255,0.05);
}

/* TEXTO */
.card {
  margin-top:40px;
  padding:25px;
  border-radius:25px;
  background: rgba(255,255,255,0.05);
  opacity:0;
  transform: translateY(20px);
  transition:1s;
}

/* MÚSICA */
.music-card {
  margin-top:50px;
  padding:25px;
  border-radius:25px;
  background: rgba(255,255,255,0.05);
}

.music-btn {
  margin-top:15px;
  padding:15px;
  border-radius:20px;
  background: rgba(0,0,0,0.3);
  cursor:pointer;
}

.music-btn.playing {
  background:#ff6fa5;
}

.music-img {
  width:200px;
  border-radius:20px;
  margin-top:15px;
}

/* BARRA */
.progress {
  width:100%;
  height:5px;
  background:#444;
  margin-top:10px;
  border-radius:10px;
  overflow:hidden;
}

.progress div {
  height:100%;
  width:0%;
  background:#ff6fa5;
  animation: barra 180s linear forwards;
}

@keyframes barra {
  from {width:0;}
  to {width:100%;}
}

/* PARTÍCULAS */
.particle {
  position:absolute;
  width:6px;
  height:6px;
  background:#ff6fa5;
  border-radius:50%;
  animation: explode 0.8s forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y));
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="universe" id="universe"></div>
<div class="shooting-star"></div>
<div class="stars"></div>
<div class="overlay" id="overlay"></div>
<div class="glow"></div>

<div class="container">

<div class="heart">💖</div>
<div class="title">Para o amor da minha vida!</div>

<div class="date">Juntos desde <b>08 de janeiro de 2026</b></div>

<div class="boxes">
<div class="box"><span id="meses">0</span><small>MESES</small></div>
<div class="box"><span id="dias">0</span><small>DIAS</small></div>
</div>

<div class="clock" id="clock">00:00:00</div>
<div class="total" id="totalDias">✨ 0 dias de amor ✨</div>

<div class="card" id="texto">
Julia,<br><br>Desde que você entrou na minha vida...
</div>

<div class="music-card">

<div class="music-btn" id="btnDescobrir" onclick="descobrir()">▶ Clique para descobrir</div>

<div id="musicaInfo" style="display:none;">
<img src="https://img.youtube.com/vi/sRITrFmTT3s/maxresdefault.jpg" class="music-img">
<div class="progress"><div></div></div>
<div class="music-btn" onclick="tocar()">▶ Ouvir</div>
<div class="music-btn" onclick="pausar()">⏸ Pausar</div>
</div>

</div>

</div>

<iframe id="player" width="0" height="0" allow="autoplay"></iframe>

<script>
const inicio = new Date(2026,0,8);

function atualizar(){
 const agora = new Date();
 const dias = Math.floor((agora-inicio)/(1000*60*60*24));
 document.getElementById("dias").innerText = dias;
 document.getElementById("meses").innerText = Math.floor(dias/30);
}
setInterval(atualizar,1000);

/* TEXTO */
setTimeout(()=>{
 document.getElementById("texto").style.opacity=1;
 document.getElementById("texto").style.transform="translateY(0)";
},1200);

/* MÚSICA */
function descobrir(){
 document.getElementById("btnDescobrir").style.display="none";
 document.getElementById("musicaInfo").style.display="block";
}

function tocar(){
 document.getElementById("overlay").style.opacity=1;
 document.getElementById("player").src="https://www.youtube.com/embed/sRITrFmTT3s?autoplay=1";
 document.getElementById("btnDescobrir").innerText="🎶 Tocando...";
}

function pausar(){
 document.getElementById("player").src="";
 document.getElementById("overlay").style.opacity=0;
}

/* ESTRELAS */
const universo = document.getElementById("universe");
for(let i=0;i<120;i++){
 let star=document.createElement("span");
 star.style.top=Math.random()*100+"%";
 star.style.left=Math.random()*100+"%";
 universo.appendChild(star);
}

/* PARTÍCULAS */
document.addEventListener("click",function(e){
 for(let i=0;i<8;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=e.clientX+"px";
  p.style.top=e.clientY+"px";
  p.style.setProperty('--x',(Math.random()*100-50)+"px");
  p.style.setProperty('--y',(Math.random()*100-50)+"px");
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),800);
 }
});
</script>

</body>
  </html>
